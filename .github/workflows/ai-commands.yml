# ai-flow slash commands (/ask, /edit, /split, /build) — see d3mlabs/ai-flow.
# Uses the default ai-light / ai-build runner labels: jobs queue until a
# runner with those labels is registered (see the ai-flow README's adoption
# checklist; `dev runner-setup` registers a host once a `runner:` block with
# the labels is declared). The App secrets give writes the ai-flow[bot]
# identity and make /build PRs trigger CI.
name: ai-commands

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-commands:
    uses: d3mlabs/ai-flow/.github/workflows/ai-commands.yml@v1
    secrets:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      AI_FLOW_APP_ID: ${{ secrets.AI_FLOW_APP_ID }}
      AI_FLOW_APP_PRIVATE_KEY: ${{ secrets.AI_FLOW_APP_PRIVATE_KEY }}
