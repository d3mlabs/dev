# ai-flow slash commands (/ask, /edit, /split, /build) — see d3mlabs/ai-flow.
# Each command routes to its own fixed runner label (ai-ask / ai-edit /
# ai-split / ai-build; one box can carry all four): jobs queue until a
# runner with the matching label is registered (see the ai-flow README's
# adoption checklist). Model policy lives in .github/ai-flow.yml, not here —
# workflow inputs are scalar-only. The App secrets give writes the
# ai-flow[bot] identity and make /build PRs trigger CI.
name: ai-commands

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-commands:
    # @main so the workflow YAML tracks the dispatcher code, which is also
    # checked out at main — a tag pin here silently splits the two versions.
    uses: d3mlabs/ai-flow/.github/workflows/ai-commands.yml@main
    secrets:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      AI_FLOW_APP_ID: ${{ secrets.AI_FLOW_APP_ID }}
      AI_FLOW_APP_PRIVATE_KEY: ${{ secrets.AI_FLOW_APP_PRIVATE_KEY }}
